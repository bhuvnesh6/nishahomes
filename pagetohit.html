<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OCR + Video Audio Tool</title>
  <style>
    body { font-family: Arial; padding: 30px; background:#f5f5f5 }
    .box { background:white; padding:20px; margin-bottom:20px; border-radius:10px }
    button { padding:10px 20px; cursor:pointer }
    textarea { width:100%; height:120px }
  </style>
</head>
<body>

<h1>🚀 Image → Text & Video → Audio</h1>

<div class="box">
  <h2>🖼 Image to Text</h2>
  <input type="file" id="imageFile"><br><br>
  <button onclick="sendImage()">Extract Text</button>
  <h3>Result:</h3>
  <textarea id="textOutput"></textarea>
</div>

<div class="box">
  <h2>🎥 Video to Audio</h2>
  <input type="file" id="videoFile"><br><br>
  <button onclick="sendVideo()">Extract Audio</button>
  <h3>Audio:</h3>
  <div id="audioOutput"></div>
</div>

<script>

async function sendImage() {
  const fileInput = document.getElementById("imageFile");
  const file = fileInput.files[0];

  if (!file) return alert("Select image first");

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("http://localhost:8000/image-to-text", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  document.getElementById("textOutput").value = data.text || "Error";
}


async function sendVideo() {
  const fileInput = document.getElementById("videoFile");
  const file = fileInput.files[0];

  if (!file) return alert("Select video first");

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("http://localhost:8000/video-to-audio", {
    method: "POST",
    body: formData
  });

  const html = await res.text();
  document.getElementById("audioOutput").innerHTML = html;
}

</script>

</body>
</html>
