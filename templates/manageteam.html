<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Members — Nisha Homes CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #2D3142;
    --primary-deep: #1e2235;
    --primary-light: #3a3f56;
    --accent: #EF8354;
    --accent-light: #FFA07A;
    --card-bg: linear-gradient(145deg, #2D3142 0%, #3a3f56 100%);
    --text-main: #ffffff;
    --text-muted: rgba(255,255,255,0.5);
    --text-sub: rgba(255,255,255,0.7);
    --border: rgba(255,255,255,0.08);
    --radius-card: 20px;
    --radius-btn: 12px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  html, body {
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    background: var(--text-main);
    color: var(--text-main);
  }

  a { text-decoration: none; }

  /* ── BACKGROUND ── */
  .bg-scene {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .bg-scene::before {
    content: '';
    position: absolute; inset: 0;
      }
  .bg-blob {
    position: absolute; border-radius: 50%; filter: blur(100px); pointer-events: none;
  }
  .bg-blob-1 {
    width: 500px; height: 500px;
    
    top: -150px; right: -100px;
    animation: blobDrift1 16s ease-in-out infinite alternate;
  }
  .bg-blob-2 {
    width: 400px; height: 400px;
    
    bottom: -100px; left: -80px;
    animation: blobDrift2 20s ease-in-out infinite alternate;
  }
  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .grain {
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.035;
  }
  @keyframes blobDrift1 { 0% { transform: translate(0,0); } 100% { transform: translate(-30px, 50px); } }
  @keyframes blobDrift2 { 0% { transform: translate(0,0); } 100% { transform: translate(30px, -30px); } }

  /* ── TOP BAR ── */
  .top-bar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: rgba(30,34,53,0.85);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
  }

  .top-bar-left { display: flex; align-items: center; gap: 16px; }

  .back-btn {
    display: flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    color: var(--text-sub);
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.25s var(--ease), color 0.25s, transform 0.25s var(--ease), box-shadow 0.25s;
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }
  .back-btn svg { width: 15px; height: 15px; }

  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
    color: #fff;
  }
  .page-title span { color: var(--accent); }

  .member-count {
    display: inline-flex; align-items: center;
    background: rgba(239,131,84,0.15);
    border: 1px solid rgba(239,131,84,0.25);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    letter-spacing: 0.3px;
  }

  .add-btn {
    display: flex; align-items: center; gap: 7px;
    background: linear-gradient(135deg, #EF8354 0%, #FFA07A 100%);
    border: none;
    color: #fff;
    padding: 10px 18px;
    border-radius: var(--radius-btn);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    box-shadow: 0 6px 20px rgba(239,131,84,0.4);
    transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
  }
  .add-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(239,131,84,0.55);
  }
  .add-btn:active { transform: translateY(0); }
  .add-btn svg { width: 16px; height: 16px; }

  /* ── CONTENT WRAPPER ── */
  .content {
    position: relative; z-index: 1;
    padding: 32px 28px 48px;
    max-width: 1280px;
    margin: 0 auto;
  }

  /* Section label */
  .section-label {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 22px;
    opacity: 0;
    animation: fadeUp 0.6s var(--ease) 0.2s forwards;
  }
  .section-label-line { flex: 1; height: 1px; background: var(--border); }
  .section-label-text {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* ── GRID ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 18px;
  }

  /* ── MEMBER CARD ── */
  .card {
    position: relative;
    background: linear-gradient(145deg, #2D3142 0%, #3a3f56 100%);
    border-radius: var(--radius-card);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 22px 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
    animation: fadeUp 0.5s var(--ease) both;
    transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(239,131,84,0.5), transparent);
  }

  .card::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(239,131,84,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.25), 0 0 40px rgba(239,131,84,0.07);
  }

  /* Avatar */
  .card-avatar {
    width: 46px; height: 46px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(239,131,84,0.25) 0%, rgba(239,131,84,0.1) 100%);
    border: 1px solid rgba(239,131,84,0.25);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 14px;
    flex-shrink: 0;
  }

  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .card-info { flex: 1; min-width: 0; }

  .card h4 {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .card-phone {
    display: flex; align-items: center; gap: 6px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .card-phone svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* Status badge */
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(34,197,94,0.12);
    border: 1px solid rgba(34,197,94,0.2);
    color: #4ade80;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 100px;
    margin-bottom: 14px;
  }
  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px rgba(74,222,128,0.6);
    animation: statusPulse 2s ease-in-out infinite;
  }
  @keyframes statusPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .card-divider {
    height: 1px; background: var(--border); margin-bottom: 14px;
  }

  .delete-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2);
    color: #f87171;
    padding: 9px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    transition: background 0.25s var(--ease), border-color 0.25s, transform 0.25s var(--ease), box-shadow 0.25s;
  }
  .delete-btn:hover {
    background: rgba(239,68,68,0.2);
    border-color: rgba(239,68,68,0.4);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(239,68,68,0.2);
  }
  .delete-btn svg { width: 13px; height: 13px; }

  /* ── SKELETON ── */
  .skeleton {
    border-radius: var(--radius-card);
    height: 165px;
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 37%, rgba(255,255,255,0.04) 63%);
    background-size: 400% 100%;
    border: 1px solid var(--border);
    animation: shimmer 1.4s ease infinite;
  }
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1 / -1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.6s var(--ease) 0.3s forwards;
  }
  .empty-icon {
    width: 64px; height: 64px;
    background: rgba(239,131,84,0.1);
    border: 1px solid rgba(239,131,84,0.2);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
  }
  .empty-icon svg { width: 28px; height: 28px; color: var(--accent); }
  .empty-state h3 { font-size: 16px; color: var(--text-sub); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; color: var(--text-muted); }

  /* ── MODAL ── */
  .modal {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(15,18,35,0.7);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal.hidden { display: none; }

  .modal-content {
    background: linear-gradient(145deg, #2D3142 0%, #3a3f56 100%);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-card);
    padding: 28px 26px 24px;
    width: 100%; max-width: 360px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.2);
    position: relative;
    overflow: hidden;
    animation: modalIn 0.35s var(--ease) both;
  }

  .modal-content::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(239,131,84,0.6), transparent);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .modal-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, rgba(239,131,84,0.25), rgba(239,131,84,0.1));
    border: 1px solid rgba(239,131,84,0.25);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-icon svg { width: 18px; height: 18px; color: var(--accent); }

  .modal-content h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }
  .modal-content .modal-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  /* Field label */
  .modal-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 7px;
    display: block;
  }
  .modal-field { margin-bottom: 14px; }

  .modal-input-wrap { position: relative; display: flex; align-items: center; }
  .modal-input-icon {
    position: absolute; left: 14px;
    color: rgba(255,255,255,0.3);
    pointer-events: none;
    transition: color 0.25s;
  }
  .modal-input-icon svg { width: 15px; height: 15px; }

  .modal-content input {
    width: 100%;
    height: 46px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 11px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 0 14px 0 40px;
    outline: none;
    transition: border-color 0.3s var(--ease), background 0.3s, box-shadow 0.3s;
  }
  .modal-content input::placeholder { color: rgba(255,255,255,0.25); }
  .modal-content input:focus {
    border-color: rgba(239,131,84,0.6);
    background: rgba(255,255,255,0.09);
    box-shadow: 0 0 0 3px rgba(239,131,84,0.14);
  }
  .modal-content input:focus + .modal-input-icon { color: var(--accent); }

  .modal-divider { height: 1px; background: var(--border); margin: 18px 0; }

  .modal-actions { display: flex; gap: 10px; }

  .modal-add-btn {
    flex: 1;
    height: 46px;
    background: linear-gradient(135deg, #EF8354 0%, #FFA07A 100%);
    border: none; border-radius: 11px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(239,131,84,0.4);
    transition: transform 0.25s var(--ease), box-shadow 0.25s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .modal-add-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(239,131,84,0.55); }
  .modal-add-btn:active { transform: translateY(0); }

  .modal-cancel-btn {
    height: 46px;
    padding: 0 18px;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    border-radius: 11px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: background 0.25s, color 0.25s;
    white-space: nowrap;
  }
  .modal-cancel-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

  /* ── TOAST ── */
  .toast {
    position: fixed; right: 20px; bottom: 24px; z-index: 300;
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(145deg, #2D3142, #3a3f56);
    border: 1px solid var(--border);
    padding: 12px 16px 12px 14px;
    border-radius: 14px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    font-size: 13.5px;
    color: var(--text-sub);
    font-weight: 500;
    animation: toastIn 0.35s var(--ease) both;
    min-width: 220px;
  }
  .toast-icon {
    width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .toast.success .toast-icon { background: rgba(34,197,94,0.15); color: #4ade80; }
  .toast.error   .toast-icon { background: rgba(239,68,68,0.15);  color: #f87171; }
  .toast.loading .toast-icon { background: rgba(239,131,84,0.15); color: var(--accent); }

  .toast-icon svg { width: 15px; height: 15px; }
  .toast-spinner {
    width: 15px; height: 15px;
    border: 2px solid rgba(239,131,84,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .top-bar { padding: 12px 16px; }
    .page-title { font-size: 16px; }
    .content { padding: 20px 16px 48px; }
    .card-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .add-btn span { display: none; }
  }
  @media (max-width: 380px) {
    .card-grid { grid-template-columns: 1fr; }
  }

  .modal-select {
  width: 100%;
  height: 46px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 11px;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 0 14px;
  outline: none;
  transition: border-color 0.3s var(--ease), background 0.3s, box-shadow 0.3s;
  appearance: none;
}

.modal-select:focus {
  border-color: rgba(239,131,84,0.6);
  background: rgba(255,255,255,0.09);
  box-shadow: 0 0 0 3px rgba(239,131,84,0.14);
}

/* ── 3 DOT MENU ── */
.card-menu {
  position: absolute;
  top: 14px;
  right: 14px;
}

.menu-btn {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.25s;
}

.menu-btn:hover {
  background: rgba(255,255,255,0.12);
}

.menu-dropdown {
  position: absolute;
  right: 0;
  top: 42px;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: none;
  min-width: 140px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  z-index: 20;
}

.menu-dropdown button {
  width: 100%;
  padding: 10px 12px;
  background: none;
  border: none;
  color: #000000;
  text-align: left;
  cursor: pointer;
  font-size: 13px;
}

.menu-dropdown button:hover {
  background: rgba(239,68,68,0.15);
}

/* ── ACTION BUTTONS ── */
.card-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
}

.action-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    font-size: 0.85rem;
    font-weight: 600;
    text-decoration: none;
    border: none;
    cursor: pointer;

    /* smooth animation */
    transition: all 0.25s ease;
}

/* CALL BUTTON */
.call-btn {
    background: rgba(16,185,129,0.15);
    color: #10B981;
}

/* WHATSAPP BUTTON (fixed class name) */
.wa-btn {
    background: rgba(37,211,102,0.15);
    color: #25D366;
}

/* 🔥 HOVER EFFECT */
.action-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.1);
}

/* specific hover colors */
.call-btn:hover {
    background: #10B981;
    color: #fff;
}

.wa-btn:hover {
    background: #25D366;
    color: #fff;
}

/* ⚡ CLICK (ACTIVE) EFFECT */
.action-btn:active {
    transform: scale(0.96);
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-scene">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="grid-overlay"></div>
  <div class="grain"></div>
</div>

<!-- Top Bar -->
<header class="top-bar">
  <div class="top-bar-left">
    <a href="/admin">
      <button class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back
      </button>
    </a>
    <div class="page-title">Team <span>Members</span></div>
    <span class="member-count" id="memberCount">0 Active</span>
  </div>
  <button class="add-btn" onclick="openModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    <span>Add Member</span>
  </button>
</header>

<!-- Content -->
<div class="content">
  <div class="section-label">
    <div class="section-label-line"></div>
    <div class="section-label-text">All Team Members</div>
    <div class="section-label-line"></div>
  </div>

  <div class="card-grid" id="teamList"></div>
</div>

<!-- Add Modal -->
<div class="modal hidden" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div>
        <h3>Add Team Member</h3>
        <div class="modal-sub">Fill in the details below</div>
      </div>
    </div>

    <div class="modal-field">
      <label class="modal-label" for="memberName">Full Name</label>
      <div class="modal-input-wrap">
        <input id="memberName" type="text" placeholder="Team member name" />
        <span class="modal-input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
      </div>
    </div>

    <div class="modal-field">
      <label class="modal-label" for="memberNumber">Phone Number</label>
      <div class="modal-input-wrap">
        <input id="memberNumber" type="tel" placeholder="+91 phone number" />
        <span class="modal-input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11.5a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.84a16 16 0 006.29 6.29l1.21-1.21a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
        </span>
      </div>
    </div>

    <div class="modal-field">
  <label class="modal-label" for="memberRole">Role</label>
  <div class="modal-input-wrap">
    <select id="memberRole" class="modal-select">
      <option value="emp">Employee</option>
      <option value="admin">Admin</option>
    </select>
  </div>
</div>

    <div class="modal-divider"></div>

    <div class="modal-actions">
      <button class="modal-add-btn" onclick="addMember()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add Member
      </button>
      <button class="modal-cancel-btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Call Log Modal -->
<div class="modal hidden" id="callLogModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-icon">📋</div>
      <div>
        <h3>Add Call Log</h3>
        <div class="modal-sub">Update call activity</div>
      </div>
    </div>

    <input type="hidden" id="logEmpNumber">

    <div class="modal-field">
      <label class="modal-label">Call Log</label>
      <div class="modal-input-wrap">
        <input id="callLogInput" type="text" placeholder="Enter call details..." />
      </div>
    </div>

    <div class="modal-actions">
      <button class="modal-add-btn" onclick="submitCallLog()">Save Log</button>
      <button class="modal-cancel-btn" onclick="closeCallLogModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Task Modal -->


<div class="modal hidden" id="taskModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-icon">✅</div>
      <div>
        <h3>Add Task</h3>
        <div class="modal-sub">Assign task to employee</div>
      </div>
    </div>

    <input type="hidden" id="taskEmpNumber">

    <div class="modal-field">
      <label class="modal-label">Task</label>
      <div class="modal-input-wrap">
        <input id="taskInput" type="text" placeholder="Enter task..." />
      </div>
    </div>

    <div class="modal-field">
      <label class="modal-label">Status</label>
      <select id="taskStatus" class="modal-select">
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="done">Done</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="modal-add-btn" onclick="submitTask()">Add Task</button>
      <button class="modal-cancel-btn" onclick="closeTaskModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API = 'https://api.phishnix.site/api';

const list = document.getElementById('teamList');
const countBadge = document.getElementById('memberCount');

/* ── Toast ── */
function showToast(type, msg) {
  const icons = {
    success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
    error:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
    loading: `<div class="toast-spinner"></div>`
  };

  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<div class="toast-icon">${icons[type]}</div><span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), type === 'loading' ? 2200 : 2800);
}

/* ── Skeleton ── */
function showSkeletons(count = 8) {
  list.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'skeleton';
    list.appendChild(s);
  }
}

/* ── Get initials ── */
function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

/* ── Load members ── */
async function loadMembers() {
  showSkeletons();
  try {
    const res = await fetch(`${API}/get-team-assign`);
    const json = await res.json();

    list.innerHTML = '';
    countBadge.textContent = `${json.length} Active`;

    if (!json.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
            </svg>
          </div>
          <h3>No team members yet</h3>
          <p>Add your first team member to get started</p>
        </div>`;
      return;
    }

    json.forEach((emp, idx) => {
      const name = emp["Employee name"];
      const phone = emp["Employee number"];
      const cleanPhone = String(phone).replace(/[^0-9]/g, '');
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${idx * 0.06}s`;
      card.innerHTML = `
  <div class="card-menu">
    <div class="menu-btn" onclick="toggleMenu(this)">
      ⋮
    </div>
    <div class="menu-dropdown">
      <button onclick="removeMember('${phone}')">🗑 Remove</button>
      <button onclick="openCallLogModal('${phone}')">📋 Add Call Log</button>
      <button onclick="openTaskModal('${phone}')">✅ Add Task</button>
      <button onclick="">🔍 View Details</button>
      
    </div>
  </div>

  <div class="card-header">
    <div class="card-avatar">${getInitials(name)}</div>
    <div class="card-info">
      <h4>${name}</h4>
      <div class="card-phone">
        ${phone}
      </div>
    </div>
  </div>

  <div class="status-badge">
    <div class="status-dot"></div>Active
  </div>

  <div class="card-divider"></div>

  <div class="card-actions">
    <button class="action-btn call-btn"
      onclick="window.location.href='tel:${phone}'">
      📞 Call
    </button>

    <button class="action-btn wa-btn"
      onclick="window.open('https://wa.me/${cleanPhone}', '_blank')">
      💬 WhatsApp
    </button>
  </div>
`;
      
        list.appendChild(card);
    });

  } catch {
    showToast('error', 'Failed to load team members');
  }
}

/* ── Add ── */
async function addMember() {
  const name   = document.getElementById('memberName').value.trim();
  const number = document.getElementById('memberNumber').value.trim();
  const role   = document.getElementById('memberRole').value;

  if (!name || !number) { showToast('error', 'Please fill all fields'); return; }

  showToast('loading', 'Adding team member…');

  try {
    const res = await fetch(`${API}/add-team-assign`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, number, role })
    });
    const result = await res.json();

    if (result.success) {
      showToast('success', result.message);
      closeModal();
      loadMembers();
    } else {
      showToast('error', result.message);
    }
  } catch {
    showToast('error', 'Network error');
  }
}

/* ── Remove ── */
async function removeMember(number) {
  if (!confirm('Remove this team member?')) return;
  showToast('loading', 'Removing member…');

  try {
    const cleanNumber = parseInt(
      String(number).replace("+", "").trim()
    );
    const res = await fetch(`${API}/remove-team-assign/${cleanNumber}`, { method: 'DELETE' });
    const result = await res.json();

    if (result.success) {
      showToast('success', result.message);
      loadMembers();
    } else {
      showToast('error', result.message);
    }
  } catch {
    showToast('error', 'Network error');
  }
}

/* ── Modal ── */
function openModal() {
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('memberName').value = '';
  document.getElementById('memberNumber').value = '';
  setTimeout(() => document.getElementById('memberName').focus(), 50);
}
function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

loadMembers();



function toggleMenu(btn) {
  const dropdown = btn.nextElementSibling;

  document.querySelectorAll('.menu-dropdown').forEach(d => {
    if (d !== dropdown) d.style.display = 'none';
  });

  dropdown.style.display =
    dropdown.style.display === 'block' ? 'none' : 'block';
}

// close when clicking outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('.card-menu')) {
    document.querySelectorAll('.menu-dropdown')
      .forEach(d => d.style.display = 'none');
  }
});


//call log and task modals

function openCallLogModal(phone) {
  document.getElementById('callLogModal').classList.remove('hidden');
  document.getElementById('logEmpNumber').value = phone;
}

function closeCallLogModal() {
  document.getElementById('callLogModal').classList.add('hidden');
}

function openTaskModal(phone) {
  document.getElementById('taskModal').classList.remove('hidden');
  document.getElementById('taskEmpNumber').value = phone;
}

function closeTaskModal() {
  document.getElementById('taskModal').classList.add('hidden');
}

// Submit call log  
async function submitCallLog() {
  const emp = document.getElementById('logEmpNumber').value;
  const log = document.getElementById('callLogInput').value;

  if (!log) {
    showToast('error', 'Enter log');
    return;
  }

  showToast('loading', 'Saving log...');

  try {
    const res = await fetch('https://api.phishnix.site/api/modify-document', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        collection: "teamAssign",
        "Employee number": emp,
        set: {
          log: log
        }
      })
    });

    const data = await res.json();

    if (data.success) {
      showToast('success', 'Log saved');
      closeCallLogModal();
    } else {
      showToast('error', 'Failed');
    }

  } catch {
    showToast('error', 'Network error');
  }
}

async function submitTask() {
  const emp = document.getElementById('taskEmpNumber').value;
  const task = document.getElementById('taskInput').value;
  const status = document.getElementById('taskStatus').value;

  if (!task) {
    showToast('error', 'Enter task');
    return;
  }

  // 🔥 UNIQUE ID (important)
  const taskId = emp + "_" + Date.now();

  const taskObj = {
    id: taskId,
    text: task,
    status: status
  };

  showToast('loading', 'Adding task...');

  try {
    const res = await fetch(`/add-task`, {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    phone: emp,
    task: task,
    status: status
  })
});

    const data = await res.json();

    if (data.success) {
      showToast('success', 'Task added');
      closeTaskModal();
    } else {
      showToast('error', 'Failed');
    }

  } catch {
    showToast('error', 'Network error');
  }
}

</script>
</body>
</html>
