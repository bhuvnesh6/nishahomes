<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nisha Homes CRM — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#2D3142">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #2D3142;
    --primary-deep: #1e2235;
    --primary-light: #3a3f56;
    --accent: #EF8354;
    --accent-light: #FFA07A;
    --bg: #FAF9F6;
    --card-bg: linear-gradient(145deg, #2D3142 0%, #3a3f56 100%);
    --text-main: #ffffff;
    --text-muted: rgba(255,255,255,0.5);
    --text-sub: rgba(255,255,255,0.7);
    --radius-card: 20px;
    --radius-btn: 12px;
    --radius-pill: 100px;
    --ease-out-expo: cubic-bezier(0.22, 1, 0.36, 1);
  }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--primary-deep);
  }

  /* ─── SCENE ─── */
  .scene {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    opacity: 0;
    animation: sceneFadeIn 1s var(--ease-out-expo) 0.1s forwards;
  }

  @keyframes sceneFadeIn { to { opacity: 1; } }

  /* ─── BACKGROUND ─── */
  .bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 70% at 20% 20%, #3a3f56 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 80%, #1e2235 0%, transparent 60%),
                radial-gradient(ellipse 70% 60% at 50% 50%, #2D3142 0%, #1a1d2e 100%);
  }

  /* Grain overlay */
  .bg::after {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
  }

  /* Blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    will-change: transform;
  }
  .blob-1 {
    width: 520px; height: 520px;
    background: radial-gradient(circle, rgba(239,131,84,0.18) 0%, transparent 70%);
    top: -120px; right: -80px;
    animation: floatBlob1 14s ease-in-out infinite alternate;
  }
  .blob-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(45,49,66,0.6) 0%, transparent 70%);
    bottom: -80px; left: -100px;
    animation: floatBlob2 18s ease-in-out infinite alternate;
  }
  .blob-3 {
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(239,131,84,0.10) 0%, transparent 70%);
    top: 50%; left: 15%;
    animation: floatBlob3 11s ease-in-out infinite alternate;
  }

  @keyframes floatBlob1 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-40px, 50px) scale(1.12); } }
  @keyframes floatBlob2 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px, -30px) scale(1.08); } }
  @keyframes floatBlob3 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(25px, -45px) scale(0.92); } }

  /* Floating glass shards */
  .shard {
    position: absolute;
    border-radius: 16px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(4px);
    pointer-events: none;
  }
  .shard-1 { width: 120px; height: 180px; top: 10%; left: 8%; rotate: -12deg; animation: shardFloat 16s ease-in-out infinite alternate; }
  .shard-2 { width: 80px; height: 120px; top: 55%; right: 9%; rotate: 18deg; animation: shardFloat 12s ease-in-out 2s infinite alternate; }
  .shard-3 { width: 60px; height: 90px; bottom: 12%; left: 20%; rotate: 6deg; animation: shardFloat 20s ease-in-out 4s infinite alternate; }
  .shard-4 { width: 100px; height: 140px; top: 20%; right: 20%; rotate: -8deg; animation: shardFloat 14s ease-in-out 1s infinite alternate; }

  @keyframes shardFloat {
    0% { transform: translateY(0px); opacity: 0.5; }
    100% { transform: translateY(-20px); opacity: 1; }
  }

  /* Subtle grid lines */
  .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* Accent light ray */
  .light-ray {
    position: absolute;
    width: 600px; height: 600px;
    background: conic-gradient(from 220deg at 70% 10%, rgba(239,131,84,0.12) 0deg, transparent 40deg);
    top: 0; right: 0;
    pointer-events: none;
    animation: rayPulse 8s ease-in-out infinite;
  }
  @keyframes rayPulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }

  /* ─── CARD ─── */
  .card {
    position: relative;
    width: min(420px, 92vw);
    background: linear-gradient(145deg, #2D3142 0%, #3a3f56 100%);
    border-radius: var(--radius-card);
    border: 1px solid rgba(255,255,255,0.09);
    padding: 44px 40px 40px;
    box-shadow:
      0 2px 0 rgba(255,255,255,0.06) inset,
      0 32px 80px rgba(0,0,0,0.5),
      0 8px 32px rgba(0,0,0,0.3),
      0 0 0 1px rgba(0,0,0,0.2);
    transform: scale(0.9) translateY(40px);
    opacity: 0;
    animation: cardIn 0.9s var(--ease-out-expo) 0.4s forwards;
    transition: box-shadow 0.4s var(--ease-out-expo), transform 0.4s var(--ease-out-expo);
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% -10%, rgba(239,131,84,0.12) 0%, transparent 70%);
    border-radius: inherit;
    pointer-events: none;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow:
      0 2px 0 rgba(255,255,255,0.07) inset,
      0 40px 100px rgba(0,0,0,0.55),
      0 12px 40px rgba(0,0,0,0.35),
      0 0 60px rgba(239,131,84,0.08),
      0 0 0 1px rgba(0,0,0,0.2);
  }

  @keyframes cardIn {
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* Card top accent bar */
  .card-accent-bar {
    position: absolute;
    top: 0; left: 40px; right: 40px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(239,131,84,0.6), transparent);
    border-radius: 0 0 4px 4px;
  }

  /* ─── BRANDING ─── */
  .brand {
    text-align: center;
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.7s var(--ease-out-expo) 0.65s forwards;
  }

  .brand-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #EF8354, #FFA07A);
    border-radius: 14px;
    margin-bottom: 14px;
    box-shadow: 0 8px 24px rgba(239,131,84,0.4), 0 2px 8px rgba(239,131,84,0.2);
    animation: iconGlow 3s ease-in-out 1.5s infinite;
  }

  @keyframes iconGlow {
    0%,100% { box-shadow: 0 8px 24px rgba(239,131,84,0.4), 0 2px 8px rgba(239,131,84,0.2); }
    50% { box-shadow: 0 8px 32px rgba(239,131,84,0.65), 0 2px 12px rgba(239,131,84,0.35); }
  }

  .brand-icon svg { width: 24px; height: 24px; fill: #fff; }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: -0.3px;
    line-height: 1.1;
  }

  .brand-name span { color: var(--accent); }

  .brand-sub {
    margin-top: 6px;
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* ─── DIVIDER ─── */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.6s var(--ease-out-expo) 0.75s forwards;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
  .divider-text { font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }

  /* ─── FIELDS ─── */
  .field {
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(12px);
  }
  .field:nth-child(1) { animation: fadeUp 0.6s var(--ease-out-expo) 0.8s forwards; }
  .field:nth-child(2) { animation: fadeUp 0.6s var(--ease-out-expo) 0.9s forwards; }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: block;
  }

  .input-wrap {
    position: relative;
    display: flex; align-items: center;
  }

  .input-icon {
    position: absolute; left: 16px;
    display: flex; align-items: center;
    color: rgba(255,255,255,0.35);
    pointer-events: none;
    transition: color 0.3s;
    z-index: 1;
  }

  .input-icon svg { width: 17px; height: 17px; }

  .field-input {
    width: 100%;
    height: 50px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    font-weight: 400;
    padding: 0 44px 0 46px;
    outline: none;
    transition: border-color 0.3s var(--ease-out-expo), background 0.3s, box-shadow 0.3s var(--ease-out-expo);
    -webkit-appearance: none;
  }

  .field-input::placeholder { color: rgba(255,255,255,0.28); }

  .field-input:focus {
    border-color: rgba(239,131,84,0.7);
    background: rgba(255,255,255,0.09);
    box-shadow: 0 0 0 3px rgba(239,131,84,0.15), 0 4px 20px rgba(0,0,0,0.2);
  }

  .field-input:focus + .input-icon,
  .input-wrap:focus-within .input-icon { color: var(--accent); }

  /* Eye toggle */
  .eye-toggle {
    position: absolute; right: 14px;
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.35);
    padding: 4px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    z-index: 2;
  }
  .eye-toggle:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08); }
  .eye-toggle svg { width: 17px; height: 17px; }

  /* ─── EXTRAS ROW ─── */
  .extras-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.6s var(--ease-out-expo) 1s forwards;
  }

  /* Toggle switch */
  .remember-wrap { display: flex; align-items: center; gap: 9px; cursor: pointer; }

  .toggle-track {
    width: 34px; height: 19px;
    background: rgba(255,255,255,0.1);
    border-radius: 100px;
    position: relative;
    transition: background 0.3s;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .toggle-thumb {
    position: absolute;
    top: 2px; left: 2px;
    width: 13px; height: 13px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    transition: transform 0.3s var(--ease-out-expo), background 0.3s;
  }

  #remember:checked ~ label .toggle-track { background: rgba(239,131,84,0.8); border-color: rgba(239,131,84,0.4); }
  #remember:checked ~ label .toggle-thumb { transform: translateX(15px); background: #fff; }
  #remember { display: none; }

  .remember-label {
    font-size: 12.5px;
    color: var(--text-muted);
    user-select: none;
  }

  .forgot-link {
    font-size: 12.5px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    opacity: 0.85;
    transition: opacity 0.2s;
  }
  .forgot-link:hover { opacity: 1; }

  /* ─── BUTTON ─── */
  .btn-login {
    width: 100%;
    height: 52px;
    background: linear-gradient(135deg, #EF8354 0%, #FFA07A 100%);
    border: none; border-radius: var(--radius-btn);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow:
      0 8px 24px rgba(239,131,84,0.45),
      0 2px 8px rgba(239,131,84,0.25),
      0 1px 0 rgba(255,255,255,0.2) inset;
    transition:
      transform 0.25s var(--ease-out-expo),
      box-shadow 0.25s var(--ease-out-expo),
      background 0.25s;
    opacity: 0;
    animation: fadeUp 0.6s var(--ease-out-expo) 1.05s forwards, btnPulse 3s ease-in-out 2s infinite;
  }

  .btn-login::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow:
      0 14px 36px rgba(239,131,84,0.55),
      0 4px 12px rgba(239,131,84,0.35),
      0 1px 0 rgba(255,255,255,0.2) inset;
    background: linear-gradient(135deg, #f5915e 0%, #ffaf8a 100%);
  }

  .btn-login::before { opacity: 1; }

  .btn-login:active {
    transform: translateY(1px);
    box-shadow:
      0 4px 14px rgba(239,131,84,0.4),
      0 1px 4px rgba(239,131,84,0.2);
  }

  @keyframes btnPulse {
    0%,100% { box-shadow: 0 8px 24px rgba(239,131,84,0.45), 0 2px 8px rgba(239,131,84,0.25), 0 1px 0 rgba(255,255,255,0.2) inset; }
    50% { box-shadow: 0 8px 36px rgba(239,131,84,0.65), 0 2px 16px rgba(239,131,84,0.4), 0 1px 0 rgba(255,255,255,0.2) inset; }
  }

  .btn-login.loading { pointer-events: none; opacity: 0.85; }

  .btn-text { transition: opacity 0.2s; }
  .btn-spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .btn-spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── ERROR ─── */
  .error-msg {
    display: none;
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(220,53,69,0.12);
    border: 1px solid rgba(220,53,69,0.3);
    border-radius: 10px;
    font-size: 12.5px;
    color: #ff6b7a;
    text-align: center;
  }

  .error-msg.show {
    display: block;
    animation: shakeError 0.5s var(--ease-out-expo);
    box-shadow: 0 0 16px rgba(220,53,69,0.2);
  }

  @keyframes shakeError {
    0%,100% { transform: translateX(0); }
    15% { transform: translateX(-8px); }
    30% { transform: translateX(8px); }
    45% { transform: translateX(-6px); }
    60% { transform: translateX(6px); }
    75% { transform: translateX(-3px); }
    90% { transform: translateX(3px); }
  }

  /* ─── FOOTER ─── */
  .card-footer {
    margin-top: 28px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.6s var(--ease-out-expo) 1.15s forwards;
  }

  .footer-text {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.5px;
  }

  .footer-dots {
    display: flex; justify-content: center; gap: 6px;
    margin-top: 14px;
  }

  .footer-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
  }
  .footer-dot.active { background: var(--accent); box-shadow: 0 0 6px rgba(239,131,84,0.5); }

  /* ─── SHARED ANIM ─── */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── PARTICLES ─── */
  .particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(239,131,84,0.35);
    animation: particleFloat linear infinite;
    will-change: transform;
  }

  @keyframes particleFloat {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-60px) scale(1); opacity: 0; }
  }

  /* ─── MOBILE ─── */
  @media (max-width: 480px) {
    .card { padding: 34px 24px 30px; }
    .brand-name { font-size: 22px; }
    .shard-1, .shard-4 { display: none; }
  }

  .install-box {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(120%);
  background: rgba(45,49,66,0.95);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 14px 18px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  transition: all 0.5s ease;
  z-index: 9999;
}

.install-box.show {
  transform: translateX(-50%) translateY(0);
}

.install-content {
  display: flex;
  align-items: center;
  gap: 14px;
}

.install-icon {
  font-size: 26px;
}

.install-text h3 {
  font-size: 14px;
  color: white;
}

.install-text p {
  font-size: 11px;
  color: rgba(255,255,255,0.6);
}

#installBtn {
  background: linear-gradient(135deg, #EF8354, #FFA07A);
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  font-size: 12px;
}
</style>
</head>
<body>

<div class="scene">
  <!-- Background -->
  <div class="bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="light-ray"></div>
    <div class="grid-overlay"></div>
    <div class="shard shard-1"></div>
    <div class="shard shard-2"></div>
    <div class="shard shard-3"></div>
    <div class="shard shard-4"></div>
    <div class="particles" id="particles"></div>
  </div>

  <!-- Login Card -->
  <div class="card" id="loginCard">
    <div class="card-accent-bar"></div>

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </div>
      <div class="brand-name">Nisha <span>Homes</span></div>
      <div class="brand-sub">Best Real Estate CRM</div>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">Sign in to continue</div>
      <div class="divider-line"></div>
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate autocomplete="off" action="/login" method="POST">
      <div class="field">
        <label class="field-label" for="phone">Phone Number</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11.5a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.84a16 16 0 006.29 6.29l1.21-1.21a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
            </svg>
          </span>
          <input class="field-input" id="phone" name="number" type="tel" placeholder="Enter your number Add 91 before number" autocomplete="off" />
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </span>
          <input class="field-input" name="password" id="password" type="password" placeholder="Enter your password" autocomplete="new-password" />
          <button class="eye-toggle" type="button" id="eyeToggle" aria-label="Toggle password">

<script>
  //instal btn view
  let deferredPrompt;
const installBox = document.getElementById("installPrompt");
const installBtn = document.getElementById("installBtn");

// detect install availability
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  // show custom UI
  installBox.classList.add("show");
});

// install click
installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();

  const { outcome } = await deferredPrompt.userChoice;

  if (outcome === "accepted") {
    installBox.style.display = "none";
  }

  deferredPrompt = null;
});

// hide if already installed
window.addEventListener("appinstalled", () => {
  installBox.style.display = "none";
});

if (window.matchMedia('(display-mode: standalone)').matches) {
  installBox.style.display = "none";
}
</script>

<script>
  /* ── Particles ── */
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1.5;
    const left = Math.random() * 100;
    const delay = Math.random() * 18;
    const duration = Math.random() * 12 + 14;
    p.style.cssText = `width:${size}px;height:${size}px;left:${left}%;animation-duration:${duration}s;animation-delay:${delay}s;opacity:${Math.random() * 0.5 + 0.15}`;
    container.appendChild(p);
  }

  /* ── Eye Toggle ── */
  const eyeToggle = document.getElementById('eyeToggle');
  const passwordInput = document.getElementById('password');
  const eyeOpen = document.getElementById('eyeOpen');
  const eyeClosed = document.getElementById('eyeClosed');

  eyeToggle.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    eyeOpen.style.display = isPassword ? 'none' : 'block';
    eyeClosed.style.display = isPassword ? 'block' : 'none';
  });

  /* ── Login Form ── */
  const form = document.getElementById('loginForm');
  const btn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');


  /* ── Input focus: icon color via wrapper class ── */
  document.querySelectorAll('.field-input').forEach(input => {
    input.addEventListener('focus', () => {
      input.closest('.input-wrap').querySelector('.input-icon').style.color = '#EF8354';
    });
    input.addEventListener('blur', () => {
      input.closest('.input-wrap').querySelector('.input-icon').style.color = '';
    });
  });
</script>
